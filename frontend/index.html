<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema RL v1.0 | Relaciones Laborales</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --azul:        #0a2463;
    --azul-med:    #1e3a8a;
    --azul-claro:  #3b82f6;
    --azul-bright: #60a5fa;
    --rojo:        #dc2626;
    --rojo-bright: #ef4444;
    --blanco:      #ffffff;
    --gris-claro:  #f1f5f9;
    --gris:        #94a3b8;
    --texto-oscuro:#0f172a;
    --sombra:      rgba(10,36,99,0.25);
}

html, body { height: 100%; }

body {
    font-family: 'Barlow', sans-serif;
    background: var(--azul);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

/* ── FONDO GEOMÉTRICO ── */
.fondo {
    position: fixed; inset: 0; z-index: 0;
    background:
        linear-gradient(135deg, #0a2463 0%, #1e3a8a 50%, #0a2463 100%);
    overflow: hidden;
}
.fondo::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, transparent 70%);
    border-radius: 50%;
    animation: rotar 20s linear infinite;
}
.fondo::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
    border-radius: 50%;
    animation: rotar 25s linear infinite reverse;
}
@keyframes rotar { to { transform: rotate(360deg); } }

/* LÍNEAS DIAGONALES DECORATIVAS */
.lineas {
    position: fixed; inset: 0; z-index: 0;
    background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.02) 80px,
        rgba(255,255,255,0.02) 82px
    );
}

/* BARRA ROJA SUPERIOR */
.barra-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--rojo), var(--rojo-bright), var(--rojo));
    z-index: 100;
}

/* ── LAYOUT ── */
.login-wrapper {
    position: relative; z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 900px;
    width: 95%;
    min-height: 560px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    animation: subir 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes subir {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* PANEL IZQUIERDO — IDENTIDAD */
.panel-izq {
    background: linear-gradient(160deg, var(--rojo) 0%, #991b1b 100%);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
}
.panel-izq::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
}
.panel-izq::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 280px; height: 280px;
    background: rgba(0,0,0,0.1);
    border-radius: 50%;
}
.logo-shield {
    position: relative; z-index: 1;
}
.shield-icon {
    width: 70px; height: 70px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
}
.logo-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: white;
    line-height: 1.1;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}
.logo-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
}
.empresas-badges {
    display: flex; gap: 8px; margin-top: 16px;
}
.emp-badge {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    background: rgba(255,255,255,0.1);
}
.panel-izq-footer {
    position: relative; z-index: 1;
}
.version-badge {
    display: inline-block;
    padding: 5px 12px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 10px;
}
.copy-text {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
}

/* PANEL DERECHO — FORMULARIO */
.panel-der {
    background: var(--blanco);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.form-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--azul);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
}
.form-sub {
    font-size: 13px;
    color: var(--gris);
    margin-bottom: 32px;
}
.form-sub span {
    color: var(--rojo);
    font-weight: 600;
}

/* ALERTA */
.alerta {
    display: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.4;
    font-weight: 500;
}
.alerta.error  { background: #fef2f2; border-left: 3px solid var(--rojo); color: #991b1b; }
.alerta.exito  { background: #eff6ff; border-left: 3px solid var(--azul-claro); color: var(--azul); }

/* CAMPOS */
.campo { margin-bottom: 18px; }
.campo label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--azul);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
}
.input-wrap { position: relative; }
.input-wrap .icono {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--gris);
    font-size: 15px;
    pointer-events: none;
}
.input-wrap input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--texto-oscuro);
    outline: none;
    transition: all 0.2s;
    background: #f8fafc;
}
.input-wrap input:focus {
    border-color: var(--azul-claro);
    background: white;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.input-wrap input::placeholder { color: #cbd5e1; }
.ojo {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; font-size: 14px;
    color: var(--gris);
    user-select: none;
    transition: color 0.2s;
}
.ojo:hover { color: var(--azul); }

/* INTENTOS */
.intentos-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px; min-height: 16px;
}
.dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e2e8f0;
    transition: background 0.3s;
}
.dot.usado { background: var(--rojo); }
.intentos-txt { font-size: 11px; color: var(--gris); }

/* BOTÓN */
.btn-login {
    width: 100%;
    padding: 14px;
    background: var(--azul);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    position: relative;
    overflow: hidden;
}
.btn-login::before {
    content: '';
    position: absolute; left: 0; top: 0;
    width: 4px; height: 100%;
    background: var(--rojo);
    transition: width 0.3s;
}
.btn-login:hover {
    background: var(--azul-med);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px var(--sombra);
}
.btn-login:hover::before { width: 100%; opacity: 0.15; }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL BIENVENIDA ── */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,36,99,0.85);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
    background: white;
    border-radius: 16px;
    max-width: 460px; width: 100%;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    animation: subir 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.modal-header {
    background: var(--azul);
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
}
.modal-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rojo), var(--rojo-bright), var(--rojo));
}
.modal-saludo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.modal-cargo {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
}
.modal-body { padding: 28px 32px; }
.modal-fecha {
    font-size: 13px;
    color: var(--gris);
    margin-bottom: 16px;
}
.modal-fecha strong { color: var(--azul); }
.modal-motivacion {
    padding: 14px 16px;
    background: #f1f5f9;
    border-left: 3px solid var(--rojo);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #475569;
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 24px;
}
.modal-empresa {
    display: inline-block;
    padding: 4px 12px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    color: var(--azul);
    letter-spacing: 1px;
    margin-bottom: 20px;
}
.btn-entrar {
    width: 100%;
    padding: 13px;
    background: var(--rojo);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-entrar:hover {
    background: #b91c1c;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(220,38,38,0.35);
}

/* RESPONSIVE */
@media (max-width: 640px) {
    .login-wrapper { grid-template-columns: 1fr; }
    .panel-izq { padding: 32px 28px; min-height: auto; }
    .logo-titulo { font-size: 24px; }
    .panel-der { padding: 32px 28px; }
}
</style>
</head>
<body>

<div class="barra-top"></div>
<div class="fondo"></div>
<div class="lineas"></div>

<!-- MODAL BIENVENIDA -->
<div class="modal-overlay" id="modalBienvenida">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-saludo" id="modalSaludo"></div>
            <div class="modal-cargo"  id="modalCargo"></div>
        </div>
        <div class="modal-body">
            <div class="modal-fecha" id="modalFecha"></div>
            <div class="modal-empresa" id="modalEmpresa"></div>
            <div class="modal-motivacion" id="modalMotivacion"></div>
            <button class="btn-entrar" onclick="irDashboard()">
                INGRESAR AL SISTEMA →
            </button>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div class="login-wrapper">

    <!-- PANEL IZQUIERDO -->
    <div class="panel-izq">
        <div class="logo-shield">
            <div class="shield-icon">🏛️</div>
            <div class="logo-titulo">Relaciones<br>Laborales</div>
            <div class="logo-sub">Sistema de Gestión</div>
            <div class="empresas-badges">
                <span class="emp-badge">RAPEL</span>
                <span class="emp-badge">VERFRUT</span>
            </div>
        </div>
        <div class="panel-izq-footer">
            <div class="version-badge">⬡ v1.0 — 2026</div>
            <div class="copy-text">© 2026 · Creado por Joel Timoteo Gonza</div>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel-der">
        <div class="form-titulo">Iniciar Sesión</div>
        <div class="form-sub">Ingresa con tus credenciales del <span>Sistema RL</span></div>

        <div class="alerta" id="alerta"></div>

        <div class="campo">
            <label>Usuario</label>
            <div class="input-wrap">
                <span class="icono">👤</span>
                <input type="text" id="usuario" placeholder="Tu usuario"
                       autocomplete="username"
                       onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
            </div>
        </div>

        <div class="campo">
            <label>Contraseña</label>
            <div class="input-wrap">
                <span class="icono">🔒</span>
                <input type="password" id="password" placeholder="Tu contraseña"
                       autocomplete="current-password"
                       onkeydown="if(event.key==='Enter') login()">
                <span class="ojo" id="ojoBtn" onclick="togglePass()">👁️</span>
            </div>
            <div class="intentos-wrap">
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
                <span class="intentos-txt" id="intentosTxt"></span>
            </div>
        </div>

        <button class="btn-login" id="btnLogin" onclick="login()">
            <span id="btnTxt">INGRESAR</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>
</div>

<script>
const API = 'http://localhost:3000/api'; // ← Cambiar por URL de Railway en producción
let intentos = 0;

async function login() {
    const usuario  = document.getElementById('usuario').value.trim();
    const password = document.getElementById('password').value;

    if (!usuario || !password) {
        mostrarAlerta('Ingresa tu usuario y contraseña.', 'error');
        return;
    }

    setCargando(true);
    ocultarAlerta();

    try {
        const res  = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, password })
        });
        const data = await res.json();

        if (data.ok) {
            sessionStorage.setItem('token',   data.token);
            sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
            mostrarBienvenida(data);
        } else {
            intentos++;
            actualizarDots();
            mostrarAlerta(data.mensaje, 'error');
            if (intentos >= 3) {
                document.getElementById('btnLogin').disabled = true;
            }
        }
    } catch {
        mostrarAlerta('No se puede conectar al servidor. Verifica que el sistema esté activo.', 'error');
    } finally {
        setCargando(false);
    }
}

function mostrarBienvenida(data) {
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const hoy  = new Date();
    const fecha = `${dias[hoy.getDay()]} ${hoy.toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})}`;

    document.getElementById('modalSaludo').textContent    = data.saludo;
    document.getElementById('modalCargo').textContent     = data.usuario.cargo;
    document.getElementById('modalFecha').innerHTML       = `Hoy es <strong>${fecha}</strong>`;
    document.getElementById('modalEmpresa').textContent   = `🏢 ${data.usuario.empresa}`;
    document.getElementById('modalMotivacion').textContent = `"${data.motivacion}"`;
    document.getElementById('modalBienvenida').classList.add('show');
}

function irDashboard() {
    window.location.href = 'pages/dashboard.html';
}

function setCargando(v) {
    const btn = document.getElementById('btnLogin');
    btn.disabled = v || intentos >= 3;
    document.getElementById('btnTxt').style.display     = v ? 'none' : 'block';
    document.getElementById('spinner').style.display    = v ? 'block' : 'none';
}

function mostrarAlerta(msg, tipo) {
    const el = document.getElementById('alerta');
    el.textContent   = msg;
    el.className     = `alerta ${tipo}`;
    el.style.display = 'block';
}
function ocultarAlerta() {
    document.getElementById('alerta').style.display = 'none';
}

function actualizarDots() {
    for (let i = 1; i <= 3; i++) {
        document.getElementById('d'+i).classList.toggle('usado', i <= intentos);
    }
    const restantes = Math.max(0, 3 - intentos);
    document.getElementById('intentosTxt').textContent =
        intentos > 0 ? `${restantes} intento(s) restante(s)` : '';
}

function togglePass() {
    const inp = document.getElementById('password');
    const ojo = document.getElementById('ojoBtn');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ojo.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

window.addEventListener('load', () => {
    const token = sessionStorage.getItem('token');
    if (token) {
        fetch(`${API}/auth/verificar`, {
            headers: { Authorization: `Bearer ${token}` }
        }).then(r => r.json()).then(d => {
            if (d.ok) window.location.href = 'pages/dashboard.html';
        }).catch(() => {});
    }
    document.getElementById('usuario').focus();
});
</script>
</body>
</html>
